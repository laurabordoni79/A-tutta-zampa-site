<!DOCTYPE html>
<html lang="it">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ATZ | Educazione</title>

<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@300;400;500;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#050505;
font-family:'Oswald',sans-serif;
overflow-x:hidden;
}

/* SECTIONS */

.poster-section{

width:100%;

min-height:100vh;

display:flex;
justify-content:center;
align-items:center;

background-color:#050505;

padding:40px 0;
}

/* POSTER IMAGES */

.poster-image{

width:100%;
height:auto;

display:block;

object-fit:contain;
}

/* HOME BUTTON */

.home-button-section{

padding:80px 20px;

display:flex;
justify-content:center;

background:#050505;
}

.home-button{

text-decoration:none;

color:white;

border:3px solid #8d1c2f;

padding:18px 40px;

font-size:1rem;

letter-spacing:4px;

text-transform:uppercase;

font-family:'Oswald',sans-serif;

transition:0.3s;
}

.home-button:hover{

background:#8d1c2f;
}

/* FOOTER */

footer{

padding:100px 20px;

text-align:center;

background:#000;

color:white;
}

footer h3{

font-size:46px;

letter-spacing:6px;

margin-bottom:14px;
}

footer p{

letter-spacing:5px;

color:#777;
}

/* MOBILE */

@media(max-width:768px){

.poster-section{

min-height:auto;

padding:20px 0;
}

.home-button{

padding:16px 24px;

font-size:0.9rem;
}

footer h3{

font-size:34px;
}

}

</style>

</head>

<body>

<!-- HERO -->

<section class="poster-section">

<img
class="poster-image"
src="images/educazione/file_000000002158722fb3052b47c88a75c0.png"
alt="ATZ Educazione Hero"
>

</section>

<!-- FIDUCIA -->

<section class="poster-section">

<img
class="poster-image"
src="images/educazione/file_0000000028b471f5979dd9543db3a679.png"
alt="ATZ Fiducia"
>

</section>

<!-- STREET -->

<section class="poster-section">

<img
class="poster-image"
src="images/educazione/file_00000000ad6c722f8c571bc00e205389.png"
alt="ATZ Street"
>

</section>

<!-- COMUNICAZIONE -->

<section class="poster-section">

<img
class="poster-image"
src="images/educazione/file_00000000cd98722fa48c03e1a0489b6c.png"
alt="ATZ Comunicazione"
>

</section>

<!-- STIGE -->

<section class="poster-section">

<img
class="poster-image"
src="images/educazione/file_0000000047c471f68943d320d5d2b44a.png"
alt="ATZ Stige"
>

</section>

<!-- HOME BUTTON -->

<section class="home-button-section">

<a href="index.html" class="home-button">

TORNA ALLA HOME

</a>

</section>

<!-- FOOTER -->

<footer>

<h3>
ATZ

</p>

</footer>

</body>

</html>
