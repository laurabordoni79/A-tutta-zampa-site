<!DOCTYPE html>
<html lang="it">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ATZ</title>

<style>

*{
margin:0;
padding:0;

}

body{
background:black;
color:white;

overflow-x:hidden;
}

.hero{
height:100vh;

display:flex;
align-items:center;

padding:60px;

position:relative;

background:
linear-gradient(
rgba(0,0,0,0.45),
rgba(0,0,0,0.45)
),

url('HeroATZ.jpg');

background-position:center;
}

.hero-content{

z-index:2;
}

.hero h1{
font-size:90px;
line-height:0.9;

}

.hero span{

}

.hero p{

font-size:20px;

line-height:1.6;
}

.runa{

bottom:40px;

</head>

<body>

<section class="hero">

<div class="hero-content">

<h1>

NON HO PRESO<br>
UN CANE PER<br>

</span>

<p>
ATZ • Working Dog Culture
</p>

</div>

<img src="runaATZ.jpg" class="runa">

</html>
