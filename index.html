<!DOCTYPE html>
<html lang="it">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ATZ • Working Dog Culture</title>

<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@300;400;500;700&display=swap" rel="stylesheet">

<style>

/* =========================================
RESET
========================================= */

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

background:#000;

color:white;

font-family:'Oswald',sans-serif;

overflow-x:hidden;
}

/* =========================================
HEADER
========================================= */

header{

position:fixed;

top:0;
left:0;

width:100%;

z-index:999;

background:rgba(0,0,0,0.28);

backdrop-filter:blur(10px);

border-bottom:1px solid rgba(255,255,255,0.05);
}

/* =========================================
NAVBAR
========================================= */

.navbar{

display:flex;

justify-content:space-between;

align-items:center;

padding:20px 50px;
}

/* =========================================
LOGO
========================================= */

.logo{

display:flex;

align-items:center;

gap:16px;
}

.logo img{

width:56px;
height:56px;

object-fit:contain;

display:block;

filter:brightness(0) invert(1);
}

.logo h1{

font-size:2.6rem;

font-weight:700;

letter-spacing:2px;

color:white;
}

/* =========================================
MENU PREMIUM
========================================= */

.main-nav{

display:flex;

align-items:center;

gap:16px;
}

.main-nav a{

text-decoration:none;

color:white;

font-size:0.92rem;

font-weight:500;

letter-spacing:1px;

text-transform:uppercase;

padding:13px 22px;

border:2px solid rgba(255,79,216,0.75);

background:rgba(0,0,0,0.16);

backdrop-filter:blur(6px);

transition:0.3s ease;

box-shadow:
0 0 12px rgba(255,79,216,0.12);
}

.main-nav a:hover{

transform:translateY(-2px);

background:rgba(255,79,216,0.12);

box-shadow:
0 0 20px rgba(255,79,216,0.28);
}

/* =========================================
HERO
========================================= */

.hero{

height:100vh;

position:relative;

display:flex;

align-items:center;

padding:0 6%;

overflow:hidden;

background:

linear-gradient(
to right,
rgba(0,0,0,0.48) 0%,
rgba(0,0,0,0.08) 42%,
rgba(0,0,0,0.22) 100%
),

url('HeroATZ.jpg');

background-size:cover;

background-position:center top;
}

/* =========================================
LUCE SUL CANE
========================================= */

.hero::after{

content:'';

position:absolute;

inset:0;

background:
radial-gradient(
circle at 72% 36%,
rgba(255,255,255,0.24),
transparent 26%
);

mix-blend-mode:screen;

pointer-events:none;
}

/* =========================================
CONTENUTO HERO
========================================= */

.hero-content{

position:relative;

z-index:2;

max-width:720px;
}

/* =========================================
TESTO HERO
========================================= */

.hero h2{

font-size:5.2rem;

line-height:0.90;

letter-spacing:-2px;

text-transform:uppercase;

color:#f4f4f4;

text-shadow:
0 0 18px rgba(0,0,0,0.32);
}

/* =========================================
ROSA/FUCSIA
========================================= */

.hero h2 span{

display:block;

margin-top:12px;

color:#ff4fd8;

text-shadow:
0 0 10px rgba(255,79,216,0.32),
0 0 24px rgba(255,79,216,0.22);
}

/* =========================================
TESTO SECONDARIO
========================================= */

.hero p{

margin-top:24px;

font-size:1.08rem;

line-height:1.7;

font-weight:300;

max-width:680px;

color:#f0f0f0;

text-shadow:
0 0 10px rgba(0,0,0,0.25);
}

/* =========================================
RUNA
========================================= */

.hero-rune{

position:absolute;

right:34px;

bottom:26px;

width:60px;

display:block;

opacity:0.95;

filter:
brightness(0) invert(1)
drop-shadow(0 0 8px rgba(255,255,255,0.14));

pointer-events:none;

z-index:5;
}

/* =========================================
RESPONSIVE TABLET
========================================= */

@media(max-width:900px){

.navbar{

padding:16px 20px;

flex-direction:column;

gap:18px;
}

.logo h1{

font-size:2rem;
}

.logo img{

width:46px;
height:46px;
}

.main-nav{

justify-content:center;

flex-wrap:wrap;

gap:10px;
}

.main-nav a{

padding:10px 14px;

font-size:0.75rem;
}

.hero{

padding:0 5%;
}

.hero h2{

font-size:3.9rem;

line-height:0.92;
}

.hero p{

font-size:0.95rem;

max-width:95%;
}

.hero-rune{

width:50px;

right:18px;

bottom:18px;
}

}

</style>

</head>

<body>

<header>

<div class="navbar">

<div class="logo">

<img src="runa-bianca.png" alt="ATZ">

<h1>ATZ</h1>

</div>

<nav class="main-nav">

<a href="educazione.html">Educazione</a>

<a href="workingdogs.html">Working Dogs</a>

<a href="soccorso.html">Ricerca e soccorso</a>

<a href="dwd.html">Unbroken Dogs</a>

<a href="norse.html">Norse</a>

</nav>

</div>

</header>

<section class="hero">

<div class="hero-content">

<h2>

NON HO PRESO<br>

UN CANE PER<br>

TENERLO SUL DIVANO.

<span>

L'HO PRESO COME<br>

COLLEGA DI VITA.

</span>

</h2>

<p>

Non abbiamo bisogno di trasformare i cani in esseri umani per rispettarli.
Li comprendiamo per ciò che sono.

</p>

</div>

<img src="runa-bianca.png" class="hero-rune" alt="Runa">

</section>

</body>

</html>
