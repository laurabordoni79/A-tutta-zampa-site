<!DOCTYPE html>
<html lang="it">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ATZ • Working Dog Culture</title>

<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@300;400;500;700&display=swap" rel="stylesheet">

<style>

/* =======================================================
RESET
======================================================= */

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#000;
color:white;
font-family:'Oswald',sans-serif;
overflow-x:hidden;
}

/* =======================================================
HEADER
======================================================= */

header{

position:fixed;

top:0;
left:0;

width:100%;

z-index:999;

background:rgba(0,0,0,0.30);

backdrop-filter:blur(10px);

border-bottom:1px solid rgba(255,255,255,0.06);
}

/* =======================================================
NAVBAR
======================================================= */

.navbar{

display:flex;

justify-content:space-between;

align-items:center;

padding:20px 50px;
}

/* =======================================================
LOGO
======================================================= */

.logo{

display:flex;

align-items:center;

gap:16px;
}

.logo img{

width:56px;
height:56px;
object-fit:contain;
}

.logo h1{

font-size:2.6rem;

letter-spacing:2px;

font-weight:700;

color:white;
}

/* =======================================================
MENU PREMIUM
======================================================= */

.main-nav{

display:flex;

align-items:center;

gap:18px;
}

.main-nav a{

font-family:'Oswald',sans-serif;

font-size:0.95rem;

font-weight:500;

letter-spacing:1px;

text-transform:uppercase;

text-decoration:none;

color:#f5f5f5;

padding:14px 24px;

border:2px solid rgba(255,79,216,0.75);

background:rgba(0,0,0,0.18);

backdrop-filter:blur(6px);

box-shadow:
0 0 12px rgba(255,79,216,0.14);

transition:0.35s ease;

position:relative;

overflow:hidden;
}

/* =======================================================
HOVER MENU
======================================================= */

.main-nav a:hover{

transform:translateY(-3px);

border-color:#ff4fd8;

background:rgba(255,79,216,0.10);

box-shadow:
0 0 18px rgba(255,79,216,0.35),
0 0 40px rgba(255,79,216,0.15);

color:white;
}

/* =======================================================
HERO
======================================================= */

.hero{

height:100vh;

position:relative;

display:flex;

align-items:center;

padding:0 6%;

overflow:hidden;

background:

linear-gradient(
to right,
rgba(0,0,0,0.45) 0%,
rgba(0,0,0,0.10) 38%,
rgba(0,0,0,0.32) 100%
),

url('HeroATZ.jpg');

background-size:cover;

background-position:center center;
}

/* =======================================================
LUCE SUL MUSO DEL CANE
======================================================= */

.hero::after{

content:'';

position:absolute;

inset:0;

background:
radial-gradient(
circle at 73% 40%,
rgba(255,255,255,0.18),
transparent 30%
);

mix-blend-mode:screen;

pointer-events:none;
}

/* =======================================================
CONTENUTO HERO
======================================================= */

.hero-content{

position:relative;

z-index:2;

max-width:760px;
}

/* =======================================================
TESTO HERO
======================================================= */

.hero h2{

font-size:6.8rem;

line-height:0.88;

letter-spacing:-2px;

text-transform:uppercase;

color:#f4f4f4;

text-shadow:
0 0 18px rgba(0,0,0,0.35);
}

/* =======================================================
ROSA/FUCSIA
======================================================= */

.hero h2 span{

display:block;

margin-top:10px;

color:#ff4fd8;

text-shadow:
0 0 10px rgba(255,79,216,0.35),
0 0 25px rgba(255,79,216,0.25),
0 0 50px rgba(255,79,216,0.18);
}

/* =======================================================
TESTO SECONDARIO
======================================================= */

.hero p{

margin-top:24px;

font-size:1.15rem;

line-height:1.7;

max-width:700px;

font-weight:300;

color:#f0f0f0;

text-shadow:
0 0 10px rgba(0,0,0,0.25);
}

/* =======================================================
RUNA
======================================================= */

.hero-rune{

position:absolute;

right:70px;

bottom:55px;

width:82px;

opacity:0.92;

filter:
brightness(0) invert(1)
drop-shadow(0 0 10px rgba(255,255,255,0.12));

pointer-events:none;

z-index:3;
}

/* =======================================================
RESPONSIVE TABLET
======================================================= */

@media(max-width:900px){

.navbar{

padding:16px 20px;

flex-direction:column;

gap:18px;
}

.logo h1{

font-size:2rem;
}

.main-nav{

justify-content:center;

flex-wrap:wrap;

gap:12px;
}

.main-nav a{

padding:12px 16px;

font-size:0.82rem;
}

.hero{

padding:0 5%;

background-position:center center;
}

.hero h2{

font-size:4.2rem;

line-height:0.9;
}

.hero p{

font-size:0.95rem;

max-width:95%;
}

.hero-rune{

width:65px;

right:20px;

bottom:25px;
}

}
<style>

/* =========================
LOGO SISTEMATO
========================= */

.logo img{
width:58px;
height:58px;
object-fit:contain;
display:block;
filter:brightness(0) invert(1);
}

/* =========================
TESTO HERO RIDIMENSIONATO
========================= */

.hero h2{

font-size:5.1rem;

line-height:0.90;

letter-spacing:-2px;

max-width:720px;
}

.hero h2 span{

display:block;

margin-top:12px;

color:#ff4fd8;

text-shadow:
0 0 10px rgba(255,79,216,0.30),
0 0 22px rgba(255,79,216,0.20);
}

/* =========================
CANE PIÙ VISIBILE
========================= */

.hero{

background:

linear-gradient(
to right,
rgba(0,0,0,0.48) 0%,
rgba(0,0,0,0.08) 42%,
rgba(0,0,0,0.20) 100%
),

url('HeroATZ.jpg');

background-size:cover;

background-position:center top;
}

/* luce sul muso */

.hero::after{

content:'';

position:absolute;

inset:0;

background:
radial-gradient(
circle at 72% 36%,
rgba(255,255,255,0.26),
transparent 26%
);

mix-blend-mode:screen;

pointer-events:none;
}

/* =========================
RUNA SISTEMATA
========================= */

.hero-rune{

position:absolute;

right:34px;

bottom:28px;

width:62px;

display:block;

opacity:0.95;

filter:
brightness(0) invert(1)
drop-shadow(0 0 8px rgba(255,255,255,0.14));

z-index:5;
}

/* =========================
MENU PREMIUM
========================= */

.main-nav{

display:flex;

gap:16px;

align-items:center;
}

.main-nav a{

padding:13px 22px;

border:2px solid rgba(255,79,216,0.75);

background:rgba(0,0,0,0.18);

color:white;

text-decoration:none;

font-size:0.92rem;

font-weight:500;

letter-spacing:1px;

text-transform:uppercase;

transition:0.3s ease;

box-shadow:
0 0 12px rgba(255,79,216,0.12);
}

.main-nav a:hover{

transform:translateY(-2px);

background:rgba(255,79,216,0.12);

box-shadow:
0 0 18px rgba(255,79,216,0.30);
}

/* =========================
RESPONSIVE TABLET
========================= */

@media(max-width:900px){

.hero h2{

font-size:3.9rem;

line-height:0.92;
}

.hero-rune{

width:50px;

right:18px;

bottom:18px;
}

.logo img{

width:46px;
height:46px;
}

.main-nav{

gap:10px;

flex-wrap:wrap;
}

.main-nav a{

padding:10px 14px;

font-size:0.75rem;
}

}

</style>
</style>

</head>

<div class="hero-content">
