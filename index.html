<!DOCTYPE html>
<html lang="it">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ATZ • Working Dog Culture</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@300;400;500;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

/* ================= RESET ================= */

*{
margin:0;
padding:0;
box-sizing:border-box;
}

html{
scroll-behavior:smooth;
}

body{
background:#050505;
color:#f5f5f5;
font-family:'Inter',sans-serif;
overflow-x:hidden;
}

/* ================= HEADER ================= */

header{

position:fixed;

top:0;
left:0;

width:100%;

z-index:999;

background:rgba(0,0,0,0.22);

backdrop-filter:blur(10px);

border-bottom:
1px solid rgba(255,255,255,0.04);

box-shadow:
0 0 40px rgba(0,0,0,0.22);
}

/* ================= NAVBAR ================= */

.navbar{

display:flex;

justify-content:space-between;

align-items:center;

padding:22px 54px;

max-width:1700px;

margin:auto;
}

/* ================= LOGO ================= */

.logo{

display:flex;

align-items:center;

gap:16px;
}

.logo img{

width:55px;
height:55px;

object-fit:cover;
}

.logo h1{

font-family:'Oswald',sans-serif;

font-size:2.5rem;

letter-spacing:2px;

color:white;
}

/* ================= MENU ================= */

.main-nav{

display:flex;

align-items:center;

justify-content:flex-end;

gap:44px;

flex-wrap:wrap;

width:100%;
}

.main-nav a{

font-family:'Oswald',sans-serif;

font-size:1.12rem;

font-weight:500;

letter-spacing:1px;

text-transform:uppercase;

text-decoration:none;

color:#f5f5f5;

position:relative;

padding-bottom:8px;

transition:
color 0.3s ease,
transform 0.3s ease,
opacity 0.3s ease;

opacity:0.88;
}

.main-nav a:hover{

color:#ff4fd8;

opacity:1;

transform:translateY(-2px);
}

.main-nav a::after{

content:'';

position:absolute;

left:0;
bottom:0;

width:0%;

height:2px;

background:#ff4fd8;

transition:0.35s;
}

.main-nav a:hover::after{

width:100%;
}

/* ================= HERO ================= */

.hero{

height:100vh;

display:flex;

align-items:center;

padding:0 6%;

position:relative;

overflow:hidden;

background:
linear-gradient(to right,
rgba(0,0,0,0.55),
rgba(0,0,0,0.12),
rgba(0,0,0,0.45)
),

url('HeroATZ.jpg');

background-size:cover;

background-position:center;
}

/* ================= HERO CONTENT ================= */

.hero-content{

position:relative;

z-index:2;

max-width:1200px;
}

/* ================= HERO TITLE ================= */

.hero h2{

font-family:'Oswald',sans-serif;

font-size:4.6vw;

line-height:0.82;

font-weight:700;

text-transform:uppercase;

letter-spacing:-2px;

color:#f5f5f5;

text-shadow:
0 0 16px rgba(0,0,0,0.22);
}

/* ================= FUCSIA ================= */

.hero h2 span{

display:block;

margin-top:14px;

color:#ff4fd8;

text-shadow:
0 0 14px rgba(255,79,216,0.30),
0 0 30px rgba(255,79,216,0.25);
}

/* ================= HERO TEXT ================= */

.hero p{

margin-top:28px;

max-width:720px;

font-size:1rem;

line-height:1.7;

font-weight:300;

color:#f0f0f0;
}

/* ================= RUNA ================= */

.hero-rune{

position:absolute;

right:240px;
bottom:30px;

width:130px;

opacity:0.08;

pointer-events:none;
}

/* ================= RESPONSIVE ================= */

@media(max-width:900px){

.navbar{

padding:18px;

flex-direction:column;

gap:18px;
}

.main-nav{

justify-content:center;

gap:18px;
}

.main-nav a{

font-size:0.92rem;
}

.logo h1{

font-size:2rem;
}

.logo img{

width:48px;
height:48px;
}

.hero{

padding:0 6%;
}

.hero h2{

font-size:10vw;

line-height:0.84;

letter-spacing:-1px;
}

.hero p{

font-size:0.95rem;

max-width:100%;
}

.hero-rune{

right:20px;

bottom:20px;

width:70px;
}

}

</style>
</head>

<body>

<!-- HEADER -->

<header>

<div class="navbar">

<div class="logo">

<img src="logoATZ.jpg">

<h1>ATZ</h1>

</div>

<nav class="main-nav">

<a href="./educazione.html">Educazione</a>

<a href="./workingdogs.html">Working Dogs</a>

<a href="./soccorso.html">Ricerca e soccorso</a>

<a href="./dwd.html">Unbroken Dogs</a>

<a href="./norse.html">Norse</a>

</nav>

</div>

</header>

<!-- HERO -->

<section class="hero">

<div class="hero-content">

<h2>

NON HO PRESO<br>
UN CANE PER<br>
TENERLO SUL DIVANO.

<span>
L'HO PRESO COME<br>
COLLEGA DI VITA.
</span>

</h2>

<p>

Non abbiamo bisogno di trasformare i cani in esseri umani per rispettarli.
Li comprendiamo per ciò che sono.

</p>

</div>

<img src="runaATZ.jpg" class="hero-rune">

</section>

</body>
</html>
