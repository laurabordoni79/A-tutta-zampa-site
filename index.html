<style>

/* =========================
RESET
========================= */

*{
margin:0;
padding:0;
box-sizing:border-box;
}

html{
scroll-behavior:smooth;
}

body{
background:#050505;
color:#f5f5f5;
font-family:'Inter',sans-serif;
overflow-x:hidden;
}

/* =========================
HEADER
========================= */

header{
position:fixed;
top:0;
left:0;
width:100%;
z-index:999;

background:rgba(0,0,0,0.28);

backdrop-filter:blur(10px);

border-bottom:
1px solid rgba(255,255,255,0.04);
}

.navbar{

display:flex;

justify-content:space-between;

align-items:center;

padding:28px 52px;
}

/* =========================
LOGO
========================= */

.logo{

display:flex;

align-items:center;

gap:18px;
}

.logo img{

width:58px;
height:58px;

object-fit:cover;
}

.logo h1{

font-family:'Oswald',sans-serif;

font-size:2.8rem;

letter-spacing:2px;

color:white;
}

/* =========================
MENU
========================= */

nav{

display:flex;

align-items:center;

gap:50px;
}

nav a{

font-family:'Oswald',sans-serif;

font-size:1.22rem;

letter-spacing:1px;

text-transform:uppercase;

text-decoration:none;

color:#f5f5f5;

transition:0.3s;

position:relative;
}

nav a:hover{

color:#ff4fd8;
}

/* LINEA HOVER */

nav a::after{

content:'';

position:absolute;

left:0;
bottom:-6px;

width:0%;

height:2px;

background:#ff4fd8;

transition:0.3s;
}

nav a:hover::after{

width:100%;
}

/* =========================
HERO
========================= */

.hero{

height:100vh;

display:flex;

align-items:center;

padding:0 6%;

position:relative;

overflow:hidden;

background:
linear-gradient(to right,
rgba(0,0,0,0.58) 5%,
rgba(0,0,0,0.14) 48%,
rgba(0,0,0,0.42) 100%
),
url('HeroATZ.jpg');

background-size:cover;

background-position:center center;
}

/* =========================
CONTENUTO HERO
========================= */

.hero-content{

position:relative;

z-index:2;

width:82%;

max-width:1400px;
}

/* =========================
TESTO HERO
========================= */

.hero h2{

font-family:'Oswald',sans-serif;

font-size:4.3vw;

line-height:0.80;

font-weight:700;

letter-spacing:-2px;

text-transform:uppercase;

color:#f5f5f5;

max-width:1300px;

text-shadow:
0 0 14px rgba(0,0,0,0.20);
}

/* =========================
FUCSIA ORIGINALE
========================= */

.hero h2 span{

display:block;

margin-top:10px;

color:#ff4fd8;

text-shadow:
0 0 10px rgba(255,79,216,0.30),
0 0 28px rgba(255,79,216,0.28),
0 0 55px rgba(255,79,216,0.14);
}

/* =========================
SOTTOTESTO
========================= */

.hero p{

margin-top:26px;

font-size:1rem;

line-height:1.65;

max-width:760px;

font-weight:300;

color:#ececec;

text-shadow:
0 0 10px rgba(0,0,0,0.12);
}

/* =========================
RUNA
========================= */

.hero-rune{

position:absolute;

right:320px;

bottom:30px;

width:145px;

opacity:0.07;

pointer-events:none;

filter:
blur(0.5px)
drop-shadow(0 0 18px rgba(255,79,216,0.10));

z-index:1;
}

/* =========================
RESPONSIVE TABLET
========================= */

@media(max-width:900px){

.navbar{

padding:18px;

flex-direction:column;

gap:16px;
}

nav{

justify-content:center;

gap:18px;

flex-wrap:wrap;
}

nav a{

font-size:0.92rem;
}

.logo h1{

font-size:2rem;
}

.logo img{

width:48px;
height:48px;
}

.hero{

padding:0 6%;
}

.hero-content{

width:100%;
}

.hero h2{

font-size:9.8vw;

line-height:0.84;

letter-spacing:-1px;
}

.hero p{

font-size:0.96rem;

max-width:95%;
}

.hero-rune{

right:20px;

bottom:20px;

width:70px;

opacity:0.08;
}

}

</style>
