<!DOCTYPE html>
<html lang="it">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ATZ | Eventi</title>

<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@300;400;500;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

html{
scroll-behavior:smooth;
}

body{
background:#000;
color:white;
font-family:'Oswald',sans-serif;
overflow-x:hidden;
}

a{
text-decoration:none;
color:white;
}

img{
display:block;
width:100%;
}

/* CRONACHE */

.home-btn{

position:fixed;

top:30px;
left:30px;

z-index:9999;

padding:14px 22px;

border:
1px solid rgba(255,255,255,0.12);

background:
rgba(0,0,0,0.55);

backdrop-filter:blur(4px);

font-size:0.85rem;

letter-spacing:3px;

transition:0.3s;
}

.home-btn:hover{

background:white;
color:black;
}

/* HERO */

.hero{

min-height:25vh;

display:flex;
flex-direction:column;
justify-content:center;
align-items:center;

text-align:center;

padding:120px 8% 70px;
}

.hero h1{

font-size:4rem;

line-height:1;

letter-spacing:4px;

margin-bottom:25px;

text-transform:uppercase;
}

.hero p{

max-width:500px;

font-size:1.1rem;

line-height:1.9;

font-weight:300;

color:#bdbdbd;
}

/* ARCHIVIO */

.archive{

padding:0 8% 180px;
}

.archive-grid{

max-width:1100px;

margin:auto;

display:grid;

grid-template-columns:
repeat(auto-fit,minmax(300px,1fr));

gap:40px;
}

.event-card{

background:
rgba(255,255,255,0.02);

border:
1px solid rgba(255,255,255,0.08);

overflow:hidden;

transition:0.35s;
}

.event-card:hover{

transform:translateY(-4px);

border:
1px solid rgba(255,255,255,0.18);
}

.event-card img{

aspect-ratio:4/5;

object-fit:cover;
}

.event-content{

padding:28px;

text-align:center;
}

.event-label{

font-size:0.8rem;

letter-spacing:4px;

color:#8f8f8f;

margin-bottom:12px;
}

.event-content h2{

font-size:1.8rem;

line-height:1;

text-transform:uppercase;

margin-bottom:18px;
}

.event-date{

font-size:0.9rem;

letter-spacing:3px;

color:#bdbdbd;

margin-bottom:28px;
}

.event-btn{

display:inline-block;

padding:14px 24px;

border:
1px solid rgba(255,255,255,0.12);

font-size:0.8rem;

letter-spacing:3px;

transition:0.3s;
}

.event-btn:hover{

background:white;

color:black;
}

/* PLACEHOLDER */

.placeholder{

aspect-ratio:4/5;

display:flex;
justify-content:center;
align-items:center;

background:
linear-gradient(
180deg,
#111,
#050505
);

font-size:1rem;

letter-spacing:6px;

color:#666;
}

/* FOOTER */

footer{

padding:120px 8%;

display:flex;
justify-content:center;
align-items:center;
}

.footer-rune{

width:90px;

opacity:0.8;
}

/* MOBILE */

@media(max-width:900px){

.home-btn{

top:20px;
left:20px;

padding:10px 16px;

font-size:0.75rem;
}

.hero{

padding:110px 8% 50px;
}

.hero h1{

font-size:3rem;
}

.hero p{

font-size:1rem;
}

.archive{

padding:0 8% 120px;
}

.archive-grid{

grid-template-columns:1fr;

gap:30px;
}

.event-content{

padding:24px;
}

.event-content h2{

font-size:1.5rem;
}

}

</style>

</head>

<body>

<a href="cronache-dal-campo.html"
class="home-btn">

CRONACHE

</a>

<section class="hero">

<h1>

EVENTI

</h1>

<p>

Ogni incontro lascia qualcosa.<br><br>

Alcuni diventano parte della nostra storia.

</p>

</section>

<section class="archive">

<div class="archive-grid">

<!-- CARLO FAGIOLI -->

<div class="event-card">

<img src="images/cronache/eventi/2026-06-carlo-fagioli/file_0000000043d471f4b1778c3fb4f9f432.png"
alt="Carlo Fagioli">

<div class="event-content">

<div class="event-label">

STAGE

</div>

<h2>

CARLO FAGIOLI

</h2>

<div class="event-date">

ROMA • 13–14 GIUGNO 2026

</div>

<a href="carlo-fagioli.html"
class="event-btn">

ENTRA NELLO STAGE

</a>

</div>

</div>

<!-- EVENTO FUTURO -->

<div class="event-card">

<div class="placeholder">

EVENTO

FUTURO

<div class="event-content">

<div class="event-label">

</div>

<h2>

</h2>

<div class="event-date">

</div>

<a href="#"
class="event-btn">

</a>

</div>

</div>

<!-- EVENTO FUTURO -->

<div class="event-card">

<div class="placeholder">

EVENTO

FUTURO

</div>

<div class="event-content">

<div class="event-label">

SEMINARIO

</div>

<h2>

PROSSIMAMENTE

</h2>

<div class="event-date">

IN PROGRAMMAZIONE

</div>

<a href="#"
class="event-btn">

IN ARRIVO

</a>

</div>

</div>

</div>

</section>

<footer>

<img src="runa-incisa.png"
class="footer-rune"
alt="ATZ Rune">

</footer>

</body>

</html>
