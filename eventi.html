<!DOCTYPE html>
<html lang="it">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ATZ | Eventi</title>

<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@300;400;500;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

html{
scroll-behavior:smooth;
}

body{
background:#000;
color:white;
font-family:'Oswald',sans-serif;
overflow-x:hidden;
}

a{
text-decoration:none;
color:white;
}

img{
display:block;
max-width:100%;
}

/* CRONACHE BUTTON */

.home-btn{

position:fixed;

top:30px;
left:30px;

z-index:9999;

padding:14px 22px;

border:
1px solid rgba(255,255,255,0.12);

background:
rgba(0,0,0,0.55);

backdrop-filter:blur(4px);

font-size:0.85rem;

letter-spacing:3px;

transition:0.3s;
}

.home-btn:hover{

background:white;
color:black;
}

/* HERO */

.hero{

min-height:45vh;

display:flex;
flex-direction:column;
justify-content:center;
align-items:center;

text-align:center;

padding:120px 8% 80px;
}

.hero h1{

font-size:4.5rem;

line-height:0.95;

letter-spacing:4px;

margin-bottom:35px;

text-transform:uppercase;
}

.hero p{

max-width:800px;

font-size:1.2rem;

line-height:2;

font-weight:300;

color:#bdbdbd;
}

/* ARCHIVIO */

.archive{

padding:0 8% 180px;
}

.archive-grid{

max-width:1400px;

margin:auto;

display:grid;

grid-template-columns:
repeat(auto-fit,minmax(360px,1fr));

gap:40px;
}

.event-card{

border:
1px solid rgba(255,255,255,0.08);

background:
rgba(255,255,255,0.02);

overflow:hidden;

transition:0.3s;
}

.event-card:hover{

transform:translateY(-4px);

border:
1px solid rgba(255,255,255,0.18);
}

.event-card img{

width:100%;

display:block;
}

.event-content{

padding:30px;

text-align:center;
}

.event-label{

font-size:0.9rem;

letter-spacing:4px;

color:#8f8f8f;

margin-bottom:15px;
}

.event-content h2{

font-size:2rem;

line-height:1;

margin-bottom:20px;

text-transform:uppercase;
}

.event-date{

font-size:0.95rem;

letter-spacing:3px;

color:#bdbdbd;

margin-bottom:30px;
}

.event-btn{

display:inline-block;

padding:16px 30px;

border:
1px solid rgba(255,255,255,0.12);

font-size:0.85rem;

letter-spacing:3px;

transition:0.3s;
}

.event-btn:hover{

background:white;

color:black;
}

/* FOOTER */

footer{

padding:120px 8%;

display:flex;
justify-content:center;
align-items:center;
}

.footer-rune{

width:90px;

opacity:0.8;
}

/* MOBILE */

@media(max-width:900px){

.home-btn{

top:20px;
left:20px;

padding:10px 16px;

font-size:0.75rem;
}

.hero{

padding:120px 8% 60px;
}

.hero h1{

font-size:3.5rem;
}

.hero p{

font-size:1.05rem;
}

.archive{

padding:0 8% 120px;
}

.archive-grid{

grid-template-columns:1fr;

gap:30px;
}

.event-content{

padding:25px;
}

.event-content h2{

font-size:1.8rem;
}

}

</style>

</head>

<body>

<a href="cronache-dal-campo.html" class="home-btn">

CRONACHE

</a>

<section class="hero">

<h1>

EVENTI

</h1>

<p>

Ogni incontro lascia qualcosa.<br><br>

Alcuni diventano parte della nostra storia.

</p>

</section>

<section class="archive">

<div class="archive-grid">

<div class="event-card">

<img src="images/cronache/eventi/2026-06-carlo-fagioli/file_0000000043d471f4b1778c3fb4f9f432.png"
alt="Stage Carlo Fagioli">

<div class="event-content">

<div class="event-label">

STAGE

</div>

<h2>

CARLO FAGIOLI

</h2>

<div class="event-date">

ROMA • 13–14 GIUGNO 2026

</div>

<a href="carlo-fagioli.html"
class="event-btn">

ENTRA NELLO STAGE

</a>

</div>

</div>

<!-- DUPLICA QUESTA CARD PER I FUTURI EVENTI -->

</div>

</section>

<footer>

<img src="runa-incisa.png"
class="footer-rune"
alt="ATZ Rune">

</footer>

</body>

</html>
