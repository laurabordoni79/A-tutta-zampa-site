RESET
========================= */

*{
margin:0;
padding:0;
box-sizing:border-box;

body{

font-family:'Oswald',sans-serif;
color:white;
overflow-x:hidden;
}

/* =========================
GENERAL
========================= */

section{
position:relative;
width:100%;
overflow:hidden;
}

.image-section{

min-height:120vh;

display:flex;
justify-content:center;
align-items:center;

padding:80px 20px;

background-size:contain;
background-repeat:no-repeat;
background-position:center;
background-color:#050505;
}

/* =========================
HERO
========================= */

.hero-section{

min-height:100vh;

display:flex;
justify-content:center;
align-items:center;

padding:80px 20px;

background:
linear-gradient(
to bottom,
rgba(0,0,0,0.42),
rgba(0,0,0,0.72)
),

background-size:contain;
background-repeat:no-repeat;
background-position:center;
background-color:#050505;
}

.hero-content{

max-width:1100px;

text-align:center;
}

.hero-logo{

font-size:72px;
font-weight:900;

letter-spacing:6px;

margin-bottom:30px;
}

.section-mini{

font-size:14px;

letter-spacing:6px;

color:#ff2d75;

margin-bottom:24px;
}

.hero-section h1{

font-size:clamp(56px,9vw,130px);

line-height:0.92;

font-weight:900;

text-transform:uppercase;
}

.hero-sub{

max-width:900px;

margin:40px auto 0 auto;

font-size:clamp(18px,2vw,24px);

line-height:1.8;

color:#d5d5d5;
}

/* =========================
EDITORIAL BOX
========================= */

.overlay-box{

background:
rgba(0,0,0,0.42);

padding:50px;

max-width:1000px;

text-align:center;

backdrop-filter:blur(3px);
}

.overlay-box h2{

font-size:clamp(40px,7vw,92px);

line-height:1;

font-weight:900;

text-transform:uppercase;

margin-bottom:30px;
}

.overlay-box p{

font-size:clamp(18px,2vw,24px);

line-height:1.8;

color:#d6d6d6;
}

/* =========================
FINAL
========================= */

.final-section{

padding:140px 20px;

text-align:center;

background:#050505;
}

.final-section h2{

font-size:clamp(42px,7vw,95px);

line-height:1;

margin-bottom:30px;

font-weight:900;

text-transform:uppercase;
}

.final-section p{

max-width:900px;

margin:auto;

font-size:clamp(18px,2vw,26px);

line-height:1.8;

color:#d0d0d0;
}

/* =========================
FOOTER
========================= */

footer{

padding:100px 20px;

text-align:center;

background:#000;
}

footer h3{

font-size:46px;

letter-spacing:6px;

margin-bottom:14px;
}

footer p{

letter-spacing:5px;

color:#777;
}

/* =========================
MOBILE
========================= */

@media(max-width:768px){

.hero-section{
min-height:95vh;
}

.image-section{
min-height:100vh;
}

.hero-logo{
font-size:44px;
}

.hero-section h1{
font-size:58px;
}

.overlay-box{
padding:30px 20px;
}

.overlay-box h2{
font-size:42px;
}

.overlay-box p{
font-size:16px;
}

.final-section h2{
font-size:46px;
}

}

</style>

</head>

<body>

<!-- HERO -->

<section class="hero-section">

<div class="hero-content">

<div class="hero-logo">
ATZ
</div>

<p class="section-mini">
RICERCA E SOCCORSO
</p>

<h1>

NON MI INTERESSA ALTRO.<br>
SI PARTE IN DUE,<br>
SI TORNA IN DUE.

</h1>

<p class="hero-sub">

Fare soccorso non è tutta la nostra vita intera.
Farlo insieme al nostro cane però rende
la nostra vita intera.

</p>

</div>

</section>
