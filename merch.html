<!DOCTYPE html>

<title>ATZ - MERCH TEST</title>

<style>

/* =========================
   BASE
========================= */

* {
  box-sizing: border-box;
}

body {
  margin: 0;
  padding: 0;
  font-family: Arial, sans-serif;
  background: #0b0b0b;
  color: #f2f2f2;
}

/* =========================
   LAYOUT DEBUG MODE
========================= */

section {
  padding: 80px 20px;
  text-align: center;
  border: 2px solid blue; /* DEBUG SECTION */
}

/* GRID TEST */
.grid {
  display: flex;
  flex-direction: column;
  gap: 20px;

  border: 4px solid red; /* 🔴 DEVI VEDERE QUESTO */
}

/* CARD TEST */
.card {
  border: 4px solid lime; /* 🟢 DEVI VEDERE QUESTO */
  padding: 20px;
  background: rgba(255,255,255,0.03);
}

/* TYPO */

h1, h2, h3 {
  text-transform: uppercase;
  letter-spacing: 2px;
}

p {
  font-size: 14px;
  opacity: 0.85;
}

/* BUTTONS */

.btn {
  display: inline-block;
  margin: 8px auto;
  padding: 12px 16px;
  border: 1px solid white;
  color: white;
  text-decoration: none;
  text-transform: uppercase;
  font-size: 13px;
}

/* HERO */

.hero {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  background: black;
}

/* MOBILE */

@media (max-width: 768px) {
  section {
    padding: 60px 15px;
  }
}

</style>

</head>
