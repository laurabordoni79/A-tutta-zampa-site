<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ATZ Merch | Working Dogs Culture</title>

<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@300;400;500;700&display=swap" rel="stylesheet">

<style>

/* RESET */
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#000;
font-family:'Oswald',sans-serif;
color:white;
overflow-x:hidden;
}

img{max-width:100%;display:block;}
a{text-decoration:none;color:white;}

section{position:relative;}

/* TOPBAR */
.topbar{
position:fixed;
top:0;
left:0;
width:100%;
padding:34px 8%;
display:flex;
justify-content:space-between;
align-items:center;
z-index:999;
background:linear-gradient(to bottom,rgba(0,0,0,0.88),rgba(0,0,0,0));
}

.top-logo{
letter-spacing:6px;
}

.back-home{
font-size:0.9rem;
letter-spacing:4px;
color:#8f8f8f;
}

.back-home:hover{
color:white;
}

/* HERO */
.hero{
min-height:100vh;
display:flex;
align-items:center;
padding:180px 8% 140px;
background:
linear-gradient(to bottom,rgba(0,0,0,0.72),rgba(0,0,0,0.96)),
url('HeroATZ.jpg');
background-size:cover;
background-position:center;
}

.hero-title{
font-size:7rem;
line-height:0.9;
text-transform:uppercase;
margin-bottom:40px;
}

/* EDITORIAL */
.editorial{
padding:180px 8%;
}

.editorial-title{
font-size:5rem;
text-transform:uppercase;
margin-bottom:40px;
}

/* COLLECTIONS */
.collections{
padding:40px 8% 180px;
}

.collection-grid{
display:grid;
grid-template-columns:1fr;
gap:140px;
}

/* 🔴 FIX INSERITO QUI */
.collection-card{
margin-bottom:120px;
}

.collection-card img{
width:100%;
border:1px solid rgba(255,255,255,0.06);
}

.collection-name{
font-size:2.3rem;
margin-bottom:14px;
}

.collection-sub{
color:#8f8f8f;
margin-bottom:34px;
}

/* BUTTONS */
.collection-buttons a{
padding:14px 22px;
border:1px solid rgba(255,255,255,0.12);
font-size:0.8rem;
letter-spacing:3px;
background:rgba(255,255,255,0.02);
}

.collection-buttons a:hover{
background:white;
color:black;
}

/* FOOTER */
footer{
padding:140px 8%;
border-top:1px solid rgba(255,255,255,0.06);
}

.footer-title{
font-size:4rem;
text-transform:uppercase;
}

</style>
</head>

<body>

<!-- tutto il tuo HTML IDENTICO a prima -->

</body>
</html>
