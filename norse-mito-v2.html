<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>NORSE | MITO ATZ</title>

<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@300;400;500&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#000;
color:#e6e6e6;
font-family:'Oswald',sans-serif;
overflow-x:hidden;
}

/* HERO */

.hero{
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
text-align:center;

padding:120px 8%;

background:
linear-gradient(rgba(0,0,0,0.88),rgba(0,0,0,0.98)),
url('merch/norse/norse-collection.jpg');

background-size:cover;
background-position:center;
}

.hero h1{
font-size:5rem;
letter-spacing:10px;
font-weight:300;
}

/* BLOCCO TESTO */

.block{
padding:200px 8%;
max-width:760px;
margin:auto;

text-align:center;

font-size:1.2rem;
line-height:2.4;

color:#cfcfcf;

font-weight:300;
}

/* IMMAGINI FULL */

.image{
min-height:90vh;
background-size:cover;
background-position:center;
background-repeat:no-repeat;
}

/* SEPARATORE VUOTO */

.space{
height:180px;
}

/* RITUALE */

.ritual{
padding:200px 8%;
text-align:center;

border-top:1px solid rgba(255,255,255,0.05);
border-bottom:1px solid rgba(255,255,255,0.05);
}

.ritual h2{
font-size:2.6rem;
letter-spacing:6px;
font-weight:300;
}

.ritual p{
margin-top:40px;
font-size:1.05rem;
line-height:2.2;
color:#9d9d9d;
}

/* CHIUSURA */

.end{
min-height:70vh;
display:flex;
align-items:center;
justify-content:center;
text-align:center;

color:#555;

letter-spacing:8px;

font-size:0.85rem;
}

/* MOBILE */

@media(max-width:900px){

.hero h1{
font-size:3rem;
}

.block{
padding:140px 8%;
font-size:1.05rem;
}

.ritual{
padding:140px 8%;
}

.ritual h2{
font-size:2rem;
}

.image{
min-height:70vh;
}

}

</style>

</head>

<body>

<!-- HERO -->
<section class="hero">
<h1>NORSE</h1>
</section>

<!-- SILENZIO -->
<div class="block">
Alcune cose non si spiegano.<br>
Si portano addosso.
</div>

<div class="space"></div>

<!-- MATERIA -->
<section class="image" style="background-image:url('MATERIA_1.jpg')"></section>
<section class="image" style="background-image:url('MATERIA_2.jpg')"></section>
<section class="image" style="background-image:url('MATERIA_3.jpg')"></section>

<div class="space"></div>

<!-- GESTO -->
<section class="image" style="background-image:url('GESTO_1.jpg')"></section>
<section class="image" style="background-image:url('GESTO_2.jpg')"></section>

<div class="space"></div>

<!-- OGGETTO -->
<section class="image" style="background-image:url('MAGLIETTA_NORSE_1.jpg')"></section>
<section class="image" style="background-image:url('MAGLIETTA_NORSE_2.jpg')"></section>

<div class="space"></div>

<!-- RITUALE -->
<section class="ritual">
<h2>LEATHER CRAFT</h2>
<p>
Pelle pieno fiore.<br>
Non per apparire. Per durare.
</p>
</section>

<div class="space"></div>

<!-- TRACCE -->
<section class="image" style="background-image:url('TRACCE_1.jpg')"></section>
<section class="image" style="background-image:url('TRACCE_2.jpg')"></section>

<div class="space"></div>

<!-- CHIUSURA -->
<div class="block">
Ogni segno è una scelta.<br>
Ogni scelta è un peso.<br><br>

Non si possiede NORSE.<br>
Si attraversa.
</div>

<!-- END -->
<div class="end">
ATZ WORKING DOGS CULTURE
</div>

</body>
</html>
